name: PersonManager CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:

  format:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet-format
        run: |
          dotnet tool install -g dotnet-format
          dotnet format PersonManager/PersonManager.csproj --verify-no-changes
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore PersonManager/PersonManager.csproj
      - name: Build
        run: dotnet build PersonManager/PersonManager.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish PersonManager/PersonManager.csproj -c Release -o publish
      - name: Create MSI installer
        run: |
          choco install wix
          candle.exe PersonManagerInstaller.wxs -o PersonManagerInstaller.wixobj
          light.exe PersonManagerInstaller.wixobj -o PersonManagerInstaller.msi
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonManagerInstaller
          path: PersonManagerInstaller.msi
  test:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test (main project)
        run: dotnet test PersonManager/PersonManager.csproj --no-build --verbosity normal
      - name: Test (unit tests)
        run: dotnet test PersonManager.Tests/PersonManager.Tests.csproj --no-build --verbosity normal
