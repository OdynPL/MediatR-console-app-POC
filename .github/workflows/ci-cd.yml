name: Build, Test & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore MediatRApp/MediatRApp.csproj
      - name: Build
        run: dotnet build MediatRApp/MediatRApp.csproj --configuration Release --no-restore
      - name: Test
        run: dotnet test MediatRApp/MediatRApp.csproj --no-build --verbosity normal
      - name: Publish
        run: dotnet publish MediatRApp/MediatRApp.csproj -c Release -o publish
      - name: Create MSI installer
        run: |
          dotnet tool install --global wix --version 4.0.4
          wix new installer -o MediatRAppInstaller.wxs -n MediatRApp -p publish
          wix build MediatRAppInstaller.wxs -o MediatRAppInstaller.msi
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediatRAppInstaller
          path: MediatRAppInstaller.msi
