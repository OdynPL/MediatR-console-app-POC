name: PersonManager CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore PersonManager/PersonManager.csproj
      - name: Build
        run: dotnet build PersonManager/PersonManager.csproj --configuration Release --no-restore
      - name: Test
        run: dotnet test PersonManager/PersonManager.csproj --no-build --verbosity normal
      - name: Publish
        run: dotnet publish PersonManager/PersonManager.csproj -c Release -o publish
      - name: Create MSI installer
        run: |
          choco install wix
          candle.exe PersonManagerInstaller.wxs -o PersonManagerInstaller.wixobj
          light.exe PersonManagerInstaller.wixobj -o PersonManagerInstaller.msi
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonManagerInstaller
          path: PersonManagerInstaller.msi
      - name: Static code analysis (SonarScanner)
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"PersonManager" /d:sonar.host.url="https://sonarcloud.io" || echo "SonarCloud setup skipped (no token)"
          dotnet build PersonManager/PersonManager.csproj
          dotnet sonarscanner end || echo "SonarCloud analysis skipped"

  static-analysis:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Static code analysis (SonarScanner)
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"PersonManager" /d:sonar.host.url="https://sonarcloud.io" || echo "SonarCloud setup skipped (no token)"
          dotnet build PersonManager/PersonManager.csproj
          dotnet sonarscanner end || echo "SonarCloud analysis skipped"

  security:
    runs-on: windows-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Security scan (Snyk)
        run: |
          npm install -g snyk
          snyk test || echo "Snyk scan skipped (no token)"
      - name: Security scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config=auto || echo "Semgrep scan skipped"
      - name: Security scan (DevSkim)
        run: |
          dotnet tool install --global microsoft.devskim
          devskim analyze PersonManager/ --output-format text || echo "DevSkim scan skipped"
