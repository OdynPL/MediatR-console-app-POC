name: PersonManager CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  format:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet-format
        run: |
          dotnet tool install -g dotnet-format
          dotnet format PersonManager/PersonManager.csproj --verify-no-changes
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Extract version from csproj
        id: get_version
        run: |
          $version = Select-String -Path PersonManager/PersonManager.csproj -Pattern '<Version>(.*)</Version>' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "::set-output name=version::$version"
      - name: Restore dependencies
        run: dotnet restore PersonManager/PersonManager.csproj
      - name: Build
        run: dotnet build PersonManager/PersonManager.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish PersonManager/PersonManager.csproj -c Release -o publish
      - name: Create MSI installer
        run: |
          choco install wix
          candle.exe PersonManagerInstaller.wxs -o PersonManagerInstaller.wixobj
          light.exe PersonManagerInstaller.wixobj -o PersonManagerInstaller.msi
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonManagerInstaller
          path: PersonManagerInstaller.msi
      # Release publishing steps at the end
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: PersonManager v${{ env.VERSION }}
          draft: false
          prerelease: false
      - name: Upload MSI to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: PersonManagerInstaller.msi
          asset_name: PersonManagerInstaller.msi
          asset_content_type: application/octet-stream
  test:
    runs-on: windows-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test (main project)
        run: dotnet test PersonManager/PersonManager.csproj --no-build --verbosity normal
      - name: Test (unit tests)
        run: dotnet test PersonManager.Tests/PersonManager.Tests.csproj --no-build --verbosity normal
