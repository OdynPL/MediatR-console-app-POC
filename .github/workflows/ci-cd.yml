name: PersonManager CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  format:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet-format
        run: |
          dotnet tool install -g dotnet-format
          dotnet format PersonManager/PersonManager.csproj --verify-no-changes
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump patch version in csproj
        run: |
          $csproj = 'PersonManager/PersonManager.csproj'
          $content = Get-Content $csproj
          $versionLine = $content | Where-Object { $_ -match '<Version>(.*)</Version>' }
          $currentVersion = ($versionLine -replace '.*<Version>(.*)</Version>.*', '$1')
          $parts = $currentVersion.Split('.')
          $parts[2] = [int]$parts[2] + 1
          $newVersion = "$($parts[0]).$($parts[1]).$($parts[2])"
          $newContent = $content -replace "<Version>$currentVersion</Version>", "<Version>$newVersion</Version>"
          Set-Content $csproj $newContent
      - name: Commit and push increased version
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://$env:GH_PAT@github.com/OdynPL/MediatR-console-app-POC.git
          git add PersonManager/PersonManager.csproj
          git commit -m "increase release version"
          git push origin HEAD:main
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Extract version from csproj
        id: get_version
        run: |
          $version = Select-String -Path PersonManager/PersonManager.csproj -Pattern '<Version>(.*)</Version>' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Restore dependencies
        run: dotnet restore PersonManager/PersonManager.csproj
      - name: Build
        run: dotnet build PersonManager/PersonManager.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish PersonManager/PersonManager.csproj -c Release -o publish
      - name: Create MSI installer
        run: |
          choco install wix
          candle.exe PersonManagerInstaller.wxs -o PersonManagerInstaller.wixobj
          light.exe PersonManagerInstaller.wixobj -o PersonManagerInstaller.msi
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonManagerInstaller
          path: PersonManagerInstaller.msi
      # Release publishing steps at the end
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: PersonManager v${{ env.VERSION }}
          draft: false
          prerelease: false
      - name: Upload MSI to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: PersonManagerInstaller.msi
          asset_name: PersonManagerInstaller.msi
          asset_content_type: application/octet-stream
  test:
    runs-on: windows-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test (main project)
        run: dotnet test PersonManager/PersonManager.csproj --no-build --verbosity normal
      - name: Test (unit tests)
        run: dotnet test PersonManager.Tests/PersonManager.Tests.csproj --no-build --verbosity normal
